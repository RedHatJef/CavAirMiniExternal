; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:ATmega328P]
framework = arduino

; --------------------------
; ***     CAVAIR MINI    ***
; --------------------------
platform = atmelavr
board = ATmega328p
build_flags = -D SSD1306_NO_SPLASH -D SCD4x_ENABLE_DEBUGLOG=0 -D USE_FLOATS=1 -Wl,-u,vfprintf -lprintf_flt -lm
;build_flags = -D SCD4x_ENABLE_DEBUGLOG=0
board_build.f_cpu = 8000000L
lib_deps =
    https://github.com/adafruit/Adafruit_BusIO.git
    https://github.com/adafruit/Adafruit_SSD1306.git
    https://github.com/adafruit/Adafruit-GFX-Library.git
    Wire
    https://github.com/sparkfun/SparkFun_SCD4x_Arduino_Library.git
#upload_protocol = custom
upload_port = usb
monitor_port = COM5
monitor_speed = 115200
monitor_filters = default, time

upload_command = D:/projects/jef/avrdude/avrdude -c avrisp2 -v -e -C D:/projects/jef/avrdude/avrdude.conf -p m328p -U flash:w:$SOURCE:i -U lfuse:w:0xe2:m -U hfuse:w:0xd1:m -U efuse:w:0xfd:m -B 8